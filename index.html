<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Alfa Oto Servis | 7/24 TIR - Kamyon Tamiri Tekirdağ</title>
<link rel="icon" href="IMG-20260413-WA0000.jpg">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial;
    color:white;
    background:url("oter.jpeg") center/cover fixed;
    min-height:100vh;
    overflow-x:hidden;
}

/* ================= NAVBAR ================= */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 10px;
    background:rgba(220,38,38,0.9);
    backdrop-filter:blur(10px);
    position:sticky;
    top:0;
    z-index:100;
    flex-wrap:wrap;
    gap:10px;
}

.navbar b{
    font-size:1rem;
}

/* MENU */
nav{
    position:relative;
    display:flex;
    gap:5px;
    flex-wrap:wrap;
}

nav button{
    background:none;
    border:none;
    color:white;
    padding:8px 10px;
    cursor:pointer;
    border-radius:8px;
    font-size:0.9rem;
}

/* MAGIC BG */
.magic-bg{
    position:absolute;
    height:34px;
    background:linear-gradient(45deg,#00f5ff,#7b2ff7);
    border-radius:10px;
    top:50%;
    transform:translateY(-50%);
    left:0;
    transition:0.35s;
    z-index:1;
    opacity:0.85;
}

/* ================= CONTENT ================= */
.ust-resim{
    width:90%;
    max-width:350px;
    margin:15px auto;
    display:block;
    border-radius:15px;
}

h2{
    text-align:center;
    margin:10px 0;
    font-size:1.2rem;
}

/* BUTTONS */
.alt-butonlar{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin:15px;
}

.alt-butonlar button{
    padding:12px 18px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
    color:white;
    font-size:0.9rem;
    flex:1 1 140px;
    max-width:180px;
}

/* PANEL */
.panel{
    background:rgba(0,0,0,0.8);
    margin:10px;
    padding:15px;
    border-radius:15px;
    max-width:600px;
    display:none;
}

.panel.show{
    display:block;
}

/* GALERİ */
.galeri{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:8px;
    margin:20px 10px;
}

.galeri img{
    width:70px;
    height:70px;
    border-radius:50%;
    object-fit:cover;
}

/* SLIDER */
.slider{
    position:relative;
    width:90%;
    max-width:300px;
    margin:25px auto;
}

.slider img{
    width:100%;
    height:170px;
    border-radius:12px;
    object-fit:cover;
}

.ok{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    width:35px;
    height:35px;
    border-radius:50%;
    border:none;
    background:rgba(0,0,0,0.6);
    color:white;
    cursor:pointer;
}

.sol{left:5px;}
.sag{right:5px;}

/* SOSYAL */
.sosyal{
    position:fixed;
    right:10px;
    bottom:10px;
    display:flex;
    flex-direction:column;
    gap:8px;
}

.sosyal a img{
    width:50px;
    height:50px;
    border-radius:50%;
}
</style>
</head>

<body>

<div class="navbar">
    <b>Alfa Oto Servis</b>

    <nav id="menu">
        <div class="magic-bg"></div>
        <button onclick="togglePanel('bilgi')">Servis</button>
        <button onclick="togglePanel('aciklama')">Hizmet</button>
    </nav>
</div>

<img class="ust-resim" src="IMG-20260413-WA0000.jpg">

<h2>Hoş Geldiniz</h2>

<div class="alt-butonlar">
    <button style="background:linear-gradient(135deg,#22c55e,#16a34a)"
    onclick="window.open('https://maps.app.goo.gl/n1C78MNovfywVXSf9')">📍 Konum</button>

    <button style="background:linear-gradient(135deg,#ef4444,#b91c1c)"
    onclick="window.location.href='tel:+905421222826'">📞 Ara</button>
</div>

<div class="galeri">
    <img src="IMG-20260413-WA0001.jpg">
    <img src="IMG-20260413-WA0002.jpg">
    <img src="WhatsApp Image 2026-04-14 at 21.04.04.jpeg">
    <img src="Kmyon.jpeg">
</div>

<div class="slider">
    <img id="sliderImg" src="dükkan1.jpg">
    <button class="ok sol" onclick="geri()">❮</button>
    <button class="ok sag" onclick="ileri()">❯</button>
</div>

<div id="bilgi" class="panel">
    <p>📞 0542 122 28 26</p>
    <p>📍 Tekirdağ / Saray</p>
</div>

<div id="aciklama" class="panel">
    <p>
    <mark>Her marka TIR / KAMYON / OTOBÜS ağır vasıta araçlar motor, mekanik, elektrik arızaları profesyonel şekilde onarılır.</mark>
    <mark>Yağ bakımı, fren, süspansiyon, arıza ışıkları, elektrik sistemleri, modifiye ve ses sistemleri yapılır.</mark>
    </p>
</div>

<div class="sosyal">
    <a href="https://wa.me/905421222826"><img src="whatsap.jpg"></a>
    <a href="https://instagram.com/alfaoto_servis"><img src="instegram.jpg"></a>
</div>

<script>

function togglePanel(id){
    document.querySelectorAll(".panel").forEach(p=>{
        p.classList.toggle("show", p.id===id && !p.classList.contains("show"));
        if(p.id!==id) p.classList.remove("show");
    });
}

/* SLIDER */
let resimler=["sar.jpeg","Adsız3.png"];
let i=0;

function ileri(){
    i=(i+1)%resimler.length;
    document.getElementById("sliderImg").src=resimler[i];
}

function geri(){
    i=(i-1+resimler.length)%resimler.length;
    document.getElementById("sliderImg").src=resimler[i];
}

/* MAGIC MENU */
const links=document.querySelectorAll("#menu button");
const bg=document.querySelector(".magic-bg");
const menu=document.getElementById("menu");

links.forEach(btn=>{
    btn.addEventListener("mouseenter",(e)=>{
        const r=e.target.getBoundingClientRect();
        const p=menu.getBoundingClientRect();

        bg.style.width=r.width+"px";
        bg.style.left=(r.left-p.left)+"px";
    });
});

</script>

</body>
</html>
